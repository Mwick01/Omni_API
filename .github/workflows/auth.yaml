name: WhatsApp Auth (run once)
on:
  workflow_dispatch:

permissions:
  contents: write        # ← this allows git push

jobs:
  auth:
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}   # ← use the built-in token

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Node deps
        run: npm install

      - name: Install system deps
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq \
            chromium-browser libgbm-dev libasound2t64 libatk1.0-0 \
            libcups2 libnspr4 libnss3 libxss1 libxtst6 libglib2.0-0

      - name: Show QR code — scan within 60 seconds
        run: node run_once_auth.js
        timeout-minutes: 2

      - name: Commit session back to repo
        run: |
          git config user.email "bot@github.com"
          git config user.name "Notice Bot"
          git add -f .wwebjs_auth/
          git commit -m "Update WhatsApp session (Linux)" || echo "No changes"
          git push