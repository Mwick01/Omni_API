name: Notice Scraper (Green API)

on:
    schedule:
    - cron: '*/15 * * * *'
    workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4
        with:
          ref: master

      - name: Restore SQLite database
        uses: actions/cache@v4
        with:
          path: database.db
          key: notices-db-greenapi-${{ github.run_number }}
          restore-keys: notices-db-greenapi-

      - name: Restore downloads
        uses: actions/cache@v4
        with:
          path: downloads/
          key: downloads-greenapi-${{ github.run_number }}
          restore-keys: downloads-greenapi-

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run bot
        env:
          SITE_USERNAME: ${{ secrets.SITE_USERNAME }}
          SITE_PASSWORD: ${{ secrets.SITE_PASSWORD }}
          GREEN_API_INSTANCE: ${{ secrets.GREEN_API_INSTANCE }}
          GREEN_API_TOKEN: ${{ secrets.GREEN_API_TOKEN }}
          WHATSAPP_GROUP_ID: ${{ secrets.WHATSAPP_GROUP_ID }}
        run: python main.py